EditorID: HelpEnchantedWeapons
Description:
  TargetLanguage: English
  Value: >-
    You can find enchanted weapons in the world or enchant them yourself at an Arcane Enchanter. Enchanted weapons need charges when used and have to be refilled with a Pyrean Crystal.


    To recharge a weapon, open your Inventory, select the weapon and activate "Charge". Then choose the Pyrean Crystal you want to use.
