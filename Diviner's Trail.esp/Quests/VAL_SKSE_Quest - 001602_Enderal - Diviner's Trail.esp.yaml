    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat
      Data: Dynamic Combat
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableAimPunch
      Data: Disables the swaying aim and interrupt chance when holding a fully drawn bow at 0 Stamina.
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableAttacksOfOpprtunity
      Data: Disables the bonus damage dealt by and to the player when the target is power attacking, drawing a bow, casting a spell (without a ward), staggered, knocked down, etc.
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableBowStaminaCost
      Data: Disables the Stamina freeze when drawing a bow and the Stamina drain when holding a fully drawn bow.
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableDamageNerf
      Data: Disables the attack damage reduction at 0 Stamina.
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableDynamicCombatCloak
      Data: Disables the Dynamic Combat cloak. This hidden ability applies features such as Stamina costs to all NPCs on the battlefield. It uses no scripts and causes no script load, but some older mods may run heavy scripts whenever any actor is affected by any effect, including this cloak. It is recommended to uninstall those mods as this is considered a design flaw and a source of performance issues, but if you want to keep those mods, you can use this setting to disable the cloak, at the cost of losing its associated features.
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableRest
      Data: Disables the Magicka and Stamina regeneration bonus when hands are down.
    - MutagenObjectType: ScriptStringProperty
      Name: Algiz_DynamicCombat_Desc_DisableSlow
      Data: Disables the speed reduction at 0 Stamina.
